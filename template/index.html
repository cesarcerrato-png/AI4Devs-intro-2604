<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            margin: 0;
        }

        .container {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            width: min(420px, 90vw);
            text-align: center;
        }

        .container h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin: 18px 0;
            align-items: center;
            justify-content: center;
        }

        .controls input {
            flex: 1;
            padding: 10px 12px;
            font-size: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        button {
            padding: 10px 18px;
            font-size: 1rem;
            color: #ffffff;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s ease;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.24);
        }

        button:active,
        button.pressed {
            transform: translateY(2px);
            background: #1d4ed8;
            box-shadow: 0 4px 8px rgba(37, 99, 235, 0.24);
        }

        .result {
            margin-top: 12px;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #f9fafb;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111827;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reverse Text</h1>
        <div class="controls">
            <input id="textInput" type="text" placeholder="Type text here" aria-label="Text to reverse">
            <button id="reverseButton" type="button">Reverse</button>
        </div>
        <div id="result" class="result">Reversed text appears here.</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
